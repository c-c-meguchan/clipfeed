name: Update Sparkle appcast

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.3)'
        required: true

jobs:
  update-appcast:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Sparkle distribution (tools only)
        run: |
          mkdir -p sparkle-dist
          SPARKLE_VERSION=$(curl -s https://api.github.com/repos/sparkle-project/Sparkle/releases/latest | jq -r '.tag_name')
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          tar xf sparkle.tar.xz -C sparkle-dist --strip-components=1

      - name: Download DMG asset for this release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(echo "${{ github.event.inputs.tag || github.ref_name }}" | tr -d '[:space:]')
          mkdir -p "ReleaseArtifacts/${TAG}"
          RELEASE_JSON=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url')
          echo "Downloading: $ASSET_URL"
          curl -L -o "ReleaseArtifacts/${TAG}/$(basename "$ASSET_URL")" "$ASSET_URL"

      - name: Generate appcast.xml
        run: |
          TAG=$(echo "${{ github.event.inputs.tag || github.ref_name }}" | tr -d '[:space:]')
          ./sparkle-dist/bin/generate_appcast "ReleaseArtifacts/${TAG}"

      - name: Commit appcast.xml to gh-pages
        run: |
          TAG=$(echo "${{ github.event.inputs.tag || github.ref_name }}" | tr -d '[:space:]')
          APPCAST_SOURCE="ReleaseArtifacts/${TAG}/appcast.xml"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # gh-pages ブランチをチェックアウト（無ければ作成）
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            rm -rf .
          fi

          mv "$APPCAST_SOURCE" appcast.xml
          git add appcast.xml
          git commit -m "Update appcast for $TAG" || echo "No changes to commit"
          git push origin gh-pages

